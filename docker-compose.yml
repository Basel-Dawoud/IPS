services:
  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      # Dashboard now reads live state via FastAPI /ws/live (Redis-backed),
      # not direct MQTT. Only uncomment 9001 if something needs raw broker
      # access from a browser again.
      # - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:rw
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped
    networks:
      - ips-network

  redis:
    image: redis:7-alpine
    # No host port mapping needed for normal use — server reaches it via
    # the internal network. Uncomment below only for temporary CLI/GUI access.
    # ports:
    #   - "6380:6379"
    restart: unless-stopped
    networks:
      - ips-network

  postgres:
    image: timescale/timescaledb:2.27.0-pg16   # was: 2.27.0-pg16-oss
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipspass}
      POSTGRES_DB: ${POSTGRES_DB:-ipsdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipsuser} -d ${POSTGRES_DB:-ipsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5434:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./db/02-rooms.sql:/docker-entrypoint-initdb.d/02-rooms.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ips-network

  server:
    build: ./server
    environment:
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      LIVE_KEY_TTL_SECONDS: ${LIVE_KEY_TTL_SECONDS:-180}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-ipsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipspass}
      POSTGRES_DB: ${POSTGRES_DB:-ipsdb}
      POSTGRES_PORT: 5432
      CROWD_ALERT_THRESHOLD: ${CROWD_ALERT_THRESHOLD:-8}
      CROWD_ALERT_CHECK_INTERVAL_SECONDS: ${CROWD_ALERT_CHECK_INTERVAL_SECONDS:-3}
    healthcheck:
      # Same idea as postgres's healthcheck above: use the stdlib only (no
      # curl in the slim base image) so this doesn't need an extra apt-get
      # layer just to check a socket.
      test: ["CMD", "python", "-c", "import urllib.request as r; r.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8000:8000"
    depends_on:
      mosquitto:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ips-network

volumes:
  postgres_data:

networks:
  ips-network:
    driver: bridge