services:
  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    ports:
      - "1883:1883"
      # Optional advanced mode for browser MQTT access:
      # - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped
    networks:
      - ips-network

  postgres:
    image: timescale/timescaledb:2.27.0-pg16-oss
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipspass}
      POSTGRES_DB: ${POSTGRES_DB:-ipsdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipsuser} -d ${POSTGRES_DB:-ipsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5434:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ips-network

  server:
    build: ./server
    environment:
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-ipsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipspass}
      POSTGRES_DB: ${POSTGRES_DB:-ipsdb}
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ips-network

volumes:
  postgres_data:

networks:
  ips-network:
    driver: bridge